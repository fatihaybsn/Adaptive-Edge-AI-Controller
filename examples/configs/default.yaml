controller:
  target_temp: 65.0
  critical_temp: 80.0
  hard_critical_temp: 85.0
  control_interval: 2.0
  buffer_size: 600
  fopdt_time_constant: 60.0
  fopdt_dead_time: 2.0
  fopdt_prediction_horizon: 30.0
  fopdt_max_prediction_delta: 10.0

telemetry:
  log_path: "adaptive_edge_demo.csv"
  csv_flush_interval: 10

camera:
  width: 960
  height: 540
  fps: 30

yolo:
  model_path: "insan_tespit_mdeli.pt"
  confidence: 0.70
  iou: 0.45
